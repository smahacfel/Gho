# Selector dataset capture sampler run.
# Purpose: r22 buyer-quality and funding/cabal validation capture.
#
# This profile reuses the r19 feature-rich R2/Gatekeeper decision surface capture
# lane and R18C simcov-safe shadow lifecycle settings, while capturing the
# decision-time-safe buyer-quality and funding graph inputs needed by P4E/P4F.
# Runtime score sidecar output remains technical context only and cannot unlock
# execution or change Gatekeeper decisions.
#
# Start only through scripts/start_selector_lifecycle_run.py with
# --build-release-before-start.

mode = "production"
ghost_brain_config_path = "../../configs/rollout/ghost_brain_selector_dataset_sampler.toml"

[session]
active_buy_route_evidence_wait_ms = 1000
active_buy_route_manifest_cache_enabled = true
active_buy_route_manifest_cache_ttl_ms = 120000

[selector.simcov.state_readiness_latch]
enabled = true
mode = "shadow_only"
max_wait_ms = 25
poll_interval_ms = 1
fail_closed = true
allow_rpc = false

[seer]
enabled = true
source_mode = "grpc"
commitment = "processed"
stream_mode = "single_global"
tx_filter_strategy = "per_pool"
funding_lane_mode = "full_chain"
grpc_endpoint = "${GHOST_SEER_GRPC_ENDPOINT}"
grpc_x_token = "${GHOST_SEER_GRPC_X_TOKEN}"
grpc_auth_header = "x-api-key"
rpc_endpoint = "${GHOST_SEER_RPC_ENDPOINT}"
enable_pumpfun = true
enable_bonkfun = false
enable_raydium = false

[seer.program_streams]
enabled = true
endpoint = "events.nln.clr3.org:443"
auth_header = "x-api-key"
api_key_env = "NLN_API_KEY"
api_key_env_fallback = "GHOST_NLN_API_KEY"
eventstream_policy_header = '{"version":1,"allowed_programs":"all","allowed_topics":["prod.rpc.solana.pumpfun.trade","prod.rpc.solana.system.transfers"]}'
format = "JSON"
max_streams = 2
quota_policy = "fail_fast"
enabled_topics = [
  "prod.rpc.solana.pumpfun.trade",
  "prod.rpc.solana.system.transfers",
]
optional_topics = [
  "prod.rpc.solana.pumpfun.create",
  "prod.rpc.solana.pumpfun.transaction",
  "prod.rpc.solana.program.swaps",
  "prod.rpc.solana.program.swaps-partitionless",
]
disabled_optional_topics = [
  "prod.rpc.solana.pumpfun.create",
  "prod.rpc.solana.pumpfun.transaction",
  "prod.rpc.solana.program.swaps",
  "prod.rpc.solana.program.swaps-partitionless",
]
disabled_streams = []
pumpfun_create_topic = "prod.rpc.solana.pumpfun.create"
pumpfun_trade_topic = "prod.rpc.solana.pumpfun.trade"
pumpfun_buy_topic = "solana.pump_fun.buy"
pumpfun_buy_exact_sol_in_topic = "solana.pump_fun.buy_exact_sol_in"
system_transfers_topic = "prod.rpc.solana.system.transfers"
trade_resolver_ttl_ms = 30000
trade_resolver_per_mint_cap = 256
trade_resolver_global_cap = 50000
trade_dedupe_ttl_ms = 300000
trade_dedupe_max_entries = 250000
transfer_dedupe_ttl_ms = 300000
transfer_dedupe_max_entries = 500000
artifact_capture_enabled = true
artifact_capture_dir = "logs/nln_capture/shadow-burnin-v3-selector-dataset-r22-buyer-funding-validation"
artifact_queue_capacity = 65536
artifact_flush_interval_ms = 1000
artifact_transfer_sample_rate = 100

[trigger]
enabled = true
rpc_url = "${GHOST_TRIGGER_RPC_URL}"
entry_mode = "shadow_only"
max_concurrent_positions = 64
max_position_size_sol = 0.007
emergency_floor_sol = 0.0001
position_size_buffer_sol = 0.0001
slippage_tolerance = 0.20
live_exit_take_profit_pct = 0.50
live_exit_stop_loss_pct = 0.50

[trigger.shadow_run]
enabled = true
shadow_rpc_url = "${GHOST_TRIGGER_SHADOW_RPC_URL}"
payer_strategy = "configured"
commitment = "processed"
sig_verify = false
replace_recent_blockhash = true
timeout_ms = 5000
max_retries = 1
max_concurrent = 1
output_path = "../../logs/shadow_run/shadow-burnin-v3-selector-dataset-r22-buyer-funding-validation-buys.jsonl"
emit_event_bus = true

[execution]
execution_mode = "shadow"

[execution.shadow]
tx_build_compensation_ms = 200
max_quote_age_ms = 1500
entry_log_path = "../../logs/shadow_run/shadow-burnin-v3-selector-dataset-r22-buyer-funding-validation/shadow_entries.jsonl"
lifecycle_log_path = "../../logs/shadow_run/shadow-burnin-v3-selector-dataset-r22-buyer-funding-validation/shadow_lifecycle.jsonl"
timing_model = "prepared_entry_mirror"
stale_policy = "emit_warning"

[execution.events]
output_dir = "../../datasets/events/shadow-burnin-v3-selector-dataset-r22-buyer-funding-validation"
rotation_interval_ms = 300000
flush_interval_ms = 1000
max_file_size_bytes = 50000000
enable_aem_ticks = true
enable_optional_events = false

[oracle]
decision_log_path = "../../logs/rollout/shadow-burnin-v3-selector-dataset-r22-buyer-funding-validation/decisions"

[durability]
wal_enabled = false
wal_dir = "../../data/rollout/shadow-burnin-v3-selector-dataset-r22-buyer-funding-validation/wal"
snapshot_dir = "../../data/rollout/shadow-burnin-v3-selector-dataset-r22-buyer-funding-validation/snapshots"

[metrics]
enabled = true
bind = "0.0.0.0"
port = 9125

[gui_backend]
enabled = false
bind_address = "127.0.0.1"
port = 8825

[logging]
level = "info"
console_enabled = true
json_format = false
file_enabled = true
file_path = "../../logs/rollout/shadow-burnin-v3-selector-dataset-r22-buyer-funding-validation/system.log"
oracle_log_enabled = true
oracle_log_path = "../../logs/rollout/shadow-burnin-v3-selector-dataset-r22-buyer-funding-validation/oracle.log"
oracle_json_format = false
