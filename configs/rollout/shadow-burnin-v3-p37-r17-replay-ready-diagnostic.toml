# P3.7-R17 replay-ready diagnostic profile.
# Do not run this profile unless scripts/v3_p37_r17_replay_ready_preflight.py passes.
# This is a diagnostic temporal data collection profile, not a production
# candidate policy. It preserves the R16 standard-softPDD gate family while
# extending the observation window to collect replay-ready 2s/5s/7s/10s
# snapshots for causal L2 analysis.

mode = "production"
ghost_brain_config_path = "../../configs/rollout/ghost_brain_v3_p37_r17_replay_ready_diagnostic.toml"

[seer]
enabled = true
source_mode = "grpc"
commitment = "processed"
stream_mode = "single_global"
tx_filter_strategy = "per_pool"
funding_lane_mode = "disabled"
grpc_endpoint = "${GHOST_SEER_GRPC_ENDPOINT}"
grpc_x_token = "${GHOST_SEER_GRPC_X_TOKEN}"
grpc_auth_header = "x-api-key"
rpc_endpoint = "${GHOST_SEER_RPC_ENDPOINT}"
enable_pumpfun = true
enable_bonkfun = false
enable_raydium = false

[trigger]
enabled = true
rpc_url = "${GHOST_TRIGGER_RPC_URL}"
entry_mode = "shadow_only"
keypair_path = "../../wallets/shadow-burnin-test.json"
max_concurrent_positions = 5
max_position_size_sol = 0.007
emergency_floor_sol = 0.0001
position_size_buffer_sol = 0.0001
slippage_tolerance = 0.20
live_exit_take_profit_pct = 0.50
live_exit_stop_loss_pct = 0.50

[trigger.shadow_run]
enabled = true
shadow_rpc_url = "${GHOST_TRIGGER_SHADOW_RPC_URL}"
payer_strategy = "ephemeral"
commitment = "processed"
sig_verify = false
replace_recent_blockhash = true
timeout_ms = 1600
max_retries = 1
max_concurrent = 1
output_path = "../../logs/shadow_run/shadow-burnin-v3-p37-r17-replay-ready-diagnostic/buys.jsonl"
emit_event_bus = true

[execution]
execution_mode = "shadow"

[execution.shadow]
tx_build_compensation_ms = 200
max_quote_age_ms = 1500
entry_log_path = "../../logs/shadow_run/shadow-burnin-v3-p37-r17-replay-ready-diagnostic/shadow_entries.jsonl"
lifecycle_log_path = "../../logs/shadow_run/shadow-burnin-v3-p37-r17-replay-ready-diagnostic/shadow_lifecycle.jsonl"
timing_model = "prepared_entry_mirror"
stale_policy = "emit_warning"

[execution.events]
output_dir = "../../datasets/events/shadow-burnin-v3-p37-r17-replay-ready-diagnostic"
rotation_interval_ms = 300000
flush_interval_ms = 1000
max_file_size_bytes = 50000000
enable_aem_ticks = true
enable_optional_events = false

[p37_shadow_probe]
enabled = true
namespace = "shadow-burnin-v3-p37-r17-replay-ready-diagnostic"
dispatch_source = "counterfactual_shadow_probe"
sample_source = "v3_mfs_decision_rows"
sample_mode = "deterministic_hash_mod"
sample_modulus = 100
sample_threshold = 100
sampling_version = "p37-r17-replay-ready-v1"
run_id = "shadow-burnin-v3-p37-r17-replay-ready-diagnostic"
session_id = "r17-replay-ready-diagnostic"
max_probes_per_run = 15
max_probes_per_minute = 10
max_concurrent = 1
max_scan_concurrent = 8
max_probe_candidates_scanned_per_run = 20000
include_verdict_types = ["BUY", "REJECT", "PENDING"]
exclude_active_buy_rows = false
enable_eligibility_precheck = true
require_ab_record_id = true
require_materialized_feature_set = true
require_v3_replay_payload = true
require_v3_feature_snapshot_hash = true
require_v3_policy_config_hash = true
require_execution_route_identity = true
require_curve_account_state = true
dedupe_by_probe_id = true
emit_event_bus = false
event_bus_mode = "disabled"
probe_amount_source = "fixed_lamports"
probe_amount_lamports = 7000000
probe_slippage_bps = 2000
probe_quote_age_max_ms = 1500
probe_curve_age_max_ms = 1500
probe_wait_for_execution_accounts_ms = 1500
append = false
require_unique_namespace = true
selection_log_path = "../../logs/shadow_run/shadow-burnin-v3-p37-r17-replay-ready-diagnostic/probe_selection.jsonl"
skip_log_path = "../../logs/shadow_run/shadow-burnin-v3-p37-r17-replay-ready-diagnostic/probe_skips.jsonl"
transport_log_path = "../../logs/shadow_run/shadow-burnin-v3-p37-r17-replay-ready-diagnostic/probe_transport.jsonl"
entry_log_path = "../../logs/shadow_run/shadow-burnin-v3-p37-r17-replay-ready-diagnostic/probe_shadow_entries.jsonl"
lifecycle_log_path = "../../logs/shadow_run/shadow-burnin-v3-p37-r17-replay-ready-diagnostic/probe_shadow_lifecycle.jsonl"

[r17_replay_ready_contract]
enabled = true
gatekeeper_v2_replay_input_schema_version = 1
require_gatekeeper_v2_replay_contract = true
require_non_temporal_axes = true
require_temporal_decision_eval_snapshots = true
decision_eval_snapshots_enabled = true
decision_eval_snapshot_elapsed_ms = [2000, 5000, 7000, 10000]
include_terminal_snapshot = true
require_gatekeeper_v3_payload = true
require_execution_feasibility_fields = true
require_route_executable_universe_fields = true
allow_threshold_tuning = false
allow_phase_b = false
allow_p2_live = false

[oracle]
decision_log_path = "../../logs/rollout/shadow-burnin-v3-p37-r17-replay-ready-diagnostic/decisions"

[durability]
wal_enabled = false
wal_dir = "../../data/rollout/shadow-burnin-v3-p37-r17-replay-ready-diagnostic/wal"
snapshot_dir = "../../data/rollout/shadow-burnin-v3-p37-r17-replay-ready-diagnostic/snapshots"

[metrics]
enabled = true
bind = "0.0.0.0"
port = 9090

[gui_backend]
enabled = true
bind_address = "127.0.0.1"
port = 8801

[logging]
level = "info"
console_enabled = true
json_format = false
file_enabled = true
file_path = "../../logs/rollout/shadow-burnin-v3-p37-r17-replay-ready-diagnostic/system.log"
oracle_log_enabled = true
oracle_log_path = "../../logs/rollout/shadow-burnin-v3-p37-r17-replay-ready-diagnostic/oracle.log"
oracle_json_format = false
