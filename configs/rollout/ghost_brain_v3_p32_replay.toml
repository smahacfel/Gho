# Dev Unknown ── AKTYWNE (dev nieznany = podejrzane) ────────────────────────────
dev_unknown_min_market_cap_sol = 65.0
dev_unknown_min_sol_buy_ratio = 0.65
dev_unknown_max_soft_points = 5
