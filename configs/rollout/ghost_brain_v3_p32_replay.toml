# ── Hybrid gRPC / Yellowstone fingerprint thresholds ──────────────────────────
# Lekki upstream choke zsynchronizowany z Balanced: odcinamy ewidentny churn i
# flipper-heavy flow, ale nie duplikujemy agresywnych branchy prosperity w core.
