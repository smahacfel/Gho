# Ghost Brain Unified Configuration - PREDATOR v11 (Data-Driven A/B Calibration)
# Strategy: "Aggressive Precision" — maximise A-pool capture, eliminate B-pool ściek
# Kalibracja: 700-pool A vs B percentile analysis (2026-02-22)
# Kluczowe zmiany: ilościowe progi GK v2, HHI/top3 sito, reject_on_dev_sell=false, mcap=48
version = 11

[engine]
cycle_duration_ms = 1

# ==============================================================================
# 🛡️ GATEKEEPER V2: 6-Phase Analytical Filter
# ==============================================================================
[gatekeeper_v2]

# ── Mode ────────────────────────────────────────────────────────────────────────
# "standard" = Tryb reaktywny: Phase 1 trigger → re-eval → wczesne Buy/Reject możliwe
# "long"     = Tryb akumulacyjny: czeka pełne max_wait_time_ms, zbiera WSZYSTKIE TX,
#              jedna finalna ewaluacja na deadline. Brak wczesnych decyzji.
mode = "long"

# ── Pre-filter ──────────────────────────────────────────────────────────────────
min_sol_threshold = 0.001

# ── Phase 1: Quantity Gate ─────────────────────────────────────────────────────
# Dead strict 14/8/7 okazał się zbyt suchy na bieżący flow, ale pełne wyjęcie
# gate'u było tylko sondą. Wracamy do umiarkowanego 12/8/6.
min_tx_count = 12
min_unique_signers = 8
min_buy_count = 6


# Finalna ewaluacja nadal zbiera wczesne okno; nie wydłużamy go agresywnie.
# P0: Extended window needs 10s; invariant extended_window_ms <= max_wait_time_ms.
max_wait_time_ms = 10000

# ── Phase 2: Velocity Profile ──────────────────────────────────────────────────
# SURVIVAL FILTER: avg_interval_ms ≤ 400 is the PRIMARY momentum detector
# (p=1.2e-90 separation between survived vs early-death tokens)
# Survivors: 309ms avg | Early-death: 606ms avg → Strong predictive signal
min_interval_cv = 0.0
max_burst_ratio = 9999.0
min_avg_interval_ms = 0.0
max_avg_interval_ms = 450.0
min_timing_entropy = 0.0
min_dust_filtered_count = 0
max_interval_cv = 2.3
max_timing_entropy = 9999.0

# ── Phase 3: Signer Diversity ──────────────────────────────────────────────────
# SURVIVAL FILTER: HHI ≤ 0.155 predicts survival (p=1.9e-13)
# Survivors: 0.155 | Early-death: 0.200 → Lower concentration = better
min_unique_ratio = 0.0
max_unique_ratio = 1.0
max_hhi = 0.155
max_tx_per_signer = 999999
min_volume_gini = 0.53
max_volume_gini = 9999.0
max_top3_volume_pct = 0.70
max_same_ms_tx_ratio = 0.99

# ── Phase 4: Volume Sanity ─────────────────────────────────────────────────────
# SURVIVAL FILTER: buy_ratio nadal jest ważny, ale 0.83/0.84 zjadało zbyt dużo
# flow razem z innymi gate'ami. 0.80 zostawia sentiment-positive bias.
min_buy_ratio = 0.80
max_buy_ratio = 1.0
min_sol_buy_ratio = 0.0
max_sol_buy_ratio = 0.96
min_avg_tx_sol = 0.01
max_avg_tx_sol = 9999.0
min_volume_cv = 0.01
min_total_volume_sol = 1.0
max_volume_cv = 9999.0
max_total_volume_sol = 999999.0
min_consecutive_buys = 3

# ── Phase 5: Dev Behavior ──────────────────────────────────────────────────────
# Sekcja pozostaje permissive: nie wracamy tu do hardego dev-side filtra ani do
# `reject_on_dev_sell`, bo to było juz wczesniej falszywie negatywne dla A-like pools.
min_dev_buy_sol = 0.0
max_dev_buy_sol = 2.0
max_dev_tx_ratio = 0.99
max_dev_volume_ratio = 0.23
min_dev_volume_ratio = 0.0
min_dev_tx_ratio = 0.0
reject_on_dev_sell = false

# ── Phase 6: Bonding Curve Dynamics ────────────────────────────────────────────
# Shadow-burnin A/B: A-like pools miały nizszy price_change, nizszy bonding
# oraz czesciej miescily sie pod capem wolumenu / market cap.
min_price_change_ratio = 0.01
# Tymczasowy legacy safety cap — zamyka blind spot 9999.0.
# To NIE jest pełny PDD alignment (1.05), tylko pierwszy krok de-riskingu.
# Docelowe zaostrzanie: 1.20 → 1.10 → 1.05 (osobne ADR-y po validation).
max_price_change_ratio = 1.50
max_single_tx_price_impact_pct = 9999.0
min_single_sell_impact_pct = 0.0
max_single_sell_impact_pct = 9999.0
max_bonding_progress_pct = 99.0
min_bonding_progress_pct = 40.0
min_market_cap_sol = 41.0

# ── Decision ────────────────────────────────────────────────────────────────────
# 3-layer decision ON: tokeny nie giną od razu przy lekkim przekroczeniu progów —
# dostają flagę soft_score i mogą nadrobić w innych metrykach
min_phases_to_pass = 3
re_eval_tx_interval = 3
use_three_layer_decision = true

# Hard Fails ────────────────────────────────────────────────────────────────────
# Tylko skrajna koncentracja ma prawo ubić BUY na hard-fail.
hard_fail_hhi = 0.10
hard_fail_same_ms_tx_ratio = 0.60
hard_fail_top3_volume_pct = 0.70

# Soft signals ── AKTYWNE (3L scoring) ──────────────────────────────────────────
# manipulation (3) >> diversity (2) > timing (1) > ecosystem (1)
max_soft_points = 8
soft_weight_timing = 1
soft_weight_manipulation = 3
soft_weight_diversity = 2
soft_weight_ecosystem = 1
max_soft_score = 6

# ── Alpha Gate (positive selector after sybil) ───────────────────────────────
enable_alpha_gate = true
min_momentum = 0.55
min_demand = 0.55
min_alpha_joint = 0.35
min_alpha_sample = 15

# ── Prosperity filter (Balanced v1 final selector) ──────────────────────────
# Wchodzi dopiero po hard/core/sybil/alpha i ma odsiać BUY-e, które nie
# przypominają historycznie zyskownych branchy ze shadow outcome set.
