# PR-6 rollout profile: legacy paper burn-in compatibility surface
# Wszystkie wartości sekretowe muszą być dostarczone przez env/.env.

mode = "production"
ghost_brain_config_path = "../../ghost-brain/ghost_brain_config.toml"

[seer]
enabled = true
source_mode = "grpc"
commitment = "processed"
stream_mode = "single_global"
tx_filter_strategy = "per_pool"
# Legacy paper compatibility profile: keep paper/shadow-only execution for
# compare-only coverage, but run the authoritative funding lane so the same
# operator workflow still exercises real FSC coverage when explicitly requested.
funding_lane_mode = "full_chain"
grpc_endpoint = "yellowstone.example.invalid:443"
grpc_x_token = ""
rpc_endpoint = "https://rpc.example.invalid/seer"
enable_pumpfun = true
enable_bonkfun = false
enable_raydium = false

[trigger]
enabled = true
rpc_url = "https://rpc.example.invalid/trigger"
keypair_path = "../../wallets/paper-burnin-wallet.json"
entry_mode = "shadow_only"
max_concurrent_positions = 5
max_position_size_sol = 0.008
emergency_floor_sol = 0.0003
position_size_buffer_sol = 0.001
slippage_tolerance = 0.23

[trigger.shadow_run]
enabled = true
# REQUIRED in production: override via GHOST_TRIGGER_SHADOW_RPC_URL.
shadow_rpc_url = "https://shadow-rpc.example.invalid/mainnet"
commitment = "processed"
sig_verify = false
replace_recent_blockhash = true
timeout_ms = 1600
max_retries = 1
max_concurrent = 8
output_path = "../../logs/shadow_run/paper-burnin-buys.jsonl"
emit_event_bus = true

[execution]
execution_mode = "paper"

[execution.paper]
fill_delay_ms_min = 200
fill_delay_ms_max = 400
jitter_ms = 50
max_quote_age_ms = 1500
slippage_model = "off"
slippage_bps_fixed = 0
fail_prob = 0.0
stress_injection = "off"
max_open_positions_paper = 1
candidate_sampling = 1.0
rng_seed = 0

[execution.events]
output_dir = "../../datasets/events/paper-burnin"
rotation_interval_ms = 300000
flush_interval_ms = 1000
max_file_size_bytes = 50000000
enable_aem_ticks = true
enable_optional_events = false

[oracle]
decision_log_path = "../../logs/decisions.jsonl"

[durability]
wal_enabled = false
wal_dir = "../../data/rollout/paper-burnin/wal"
snapshot_dir = "../../data/rollout/paper-burnin/snapshots"

[metrics]
enabled = true
bind = "0.0.0.0"
port = 9090

[gui_backend]
enabled = true
bind_address = "127.0.0.1"
port = 8801

[logging]
level = "info"
console_enabled = true
json_format = false
file_enabled = true
file_path = "../../logs/rollout/paper-burnin/system.log"
oracle_log_enabled = true
oracle_log_path = "../../logs/rollout/paper-burnin/oracle.log"
oracle_json_format = false
