# =============================================================================
# TCF (Trend Cohesion Field) Configuration
# =============================================================================
# TCF measures the coherence of market dynamics across scoring cycles.
# It evaluates whether the mechanism generating market changes remains consistent.
# TCF participates ONLY in Final Verdict (after S13), modulating momentum.
#
# Formula: effective_momentum = base_momentum * (tcf_min_modulation + tcf_modulation_range * tcf_score)
# Example: base_momentum=50, tcf_score=0.8 → effective_momentum = 50 * (0.6 + 0.4*0.8) = 46

[tcf]
# Enable TCF analysis
enabled = false

# Weight of TCF in Final Verdict calculation (0.0-1.0)
# Higher values give TCF more influence on the final score
weight_in_final_verdict = 0.15

# Minimum modulation factor (floor when tcf_score = 0)
# Value of 0.6 means momentum can be reduced to 60% at worst
tcf_min_modulation = 0.6

# Modulation range (added to min when tcf_score = 1)
# Value of 0.4 means full momentum preserved when tcf_score = 1.0
tcf_modulation_range = 0.4

# Decay factor for cohesion history integral (0.5-0.99)
# Higher = faster forgetting of old cohesions, faster adaptation
# Lower = longer memory, more stable but slower to detect changes
decay_factor = 0.85

# Minimum TCF updates before considered "primed" for reliable scoring
# TCF needs at least this many cycles to establish baseline expectations
min_updates_for_primed = 3

# Direction alignment weight in cohesion calculation (0.0-1.0)
# How much weight is given to direction consistency
cohesion_direction_weight = 0.40

# Rhythm (magnitude) weight in cohesion calculation (0.0-1.0)
# How much weight is given to volatility similarity
cohesion_rhythm_weight = 0.30

# Stability weight in cohesion calculation (0.0-1.0)
# How much weight is given to internal consistency preservation
cohesion_stability_weight = 0.30

# Volatility sensitivity (higher = more penalty for volatility spikes)
volatility_sensitivity = 2.0

# Direction sensitivity (higher = more penalty for direction contradictions)
direction_sensitivity = 1.5

# Penalty for price-volume divergence
price_volume_divergence_penalty = 0.15

# Maximum bonus for perfect alignment
alignment_bonus_max = 0.10

# Cliff detection threshold (drop in cohesion that triggers cliff warning)
cliff_threshold = 0.25

# High cohesion threshold (above this is considered "good" cohesion)
high_cohesion_threshold = 0.7

# Low cohesion threshold (below this triggers consecutive low counter)
low_cohesion_threshold = 0.4

# ==============================================================================
# BVA (Behavioral Vacuum Analysis) Configuration
# ==============================================================================
[bva]
# Primary window where BVA is dominant (seconds)
primary_window_secs = 3

# Slot duration estimate for normalization
slot_duration_ms = 400

# Early reaction window in slots
early_reaction_slots = 2

# Metric weights (sum to 1.0)
weight_tds = 0.20
weight_dc = 0.30
weight_se = 0.10
weight_cer = 0.10
weight_erp = 0.30

# SOBP directional blend weight
sobp_dc_blend = 0.4

# SCR prior weight from BVA classification
scr_prior_weight = 0.15

# Minimum weight for CIR echo timing decay
cir_min_weight = 0.10

# Confidence divisors
confidence_tx_divisor = 5
confidence_signer_divisor = 3
confidence_time_divisor_ms = 2000

# Confidence penalties
sobp_fallback_confidence_penalty = 0.15
congestion_confidence_penalty = 0.10

# Classification thresholds
classification_confidence_floor = 0.30
classification_organic_tds_min = 0.55
classification_organic_se_min = 0.55
classification_organic_dc_min = 0.35
classification_steered_dc_min = 0.70
classification_steered_erp_min = 0.60

# ==============================================================================
# 🎯 SECTION 9: SURVIVOR SCORE CONFIGURATION
# ==============================================================================
# Controls the formula: S = (survival)^Ws × (momentum)^Wm × (quality)^Wq × (1 - risk_discount)
# All exponent weights control how much each component contributes to the final score.

[survivor_score]
# Exponent weights (NOT linear weights - these are powers in the formula)
weight_survival = 0.35   # Ws (exponent, not linear weight)
weight_momentum = 0.30   # Wm (exponent)
weight_quality = 0.20    # Wq (exponent)

# Survival component weights for scoring cycles (no IWIM)
# During cycles S1-S13, IWIM is NOT included. Weights: QEDD (62.5%) + Cluster (37.5%)
[survivor_score.survival_cycle]
qedd = 0.625
cluster = 0.375

# Survival component weights for Final Verdict (with IWIM)
# At Final Verdict, IWIM is included: QEDD (50%) + IWIM (30%) + Cluster (20%)
[survivor_score.survival_final_verdict]
qedd = 0.5
iwim = 0.3
cluster = 0.2

# Quality component weights for Early Stage (S1-S6, no SCR)
# SCR is excluded because FFT requires ~20+ samples for statistical significance
[survivor_score.quality_early_stage]
mpcf = 0.44
mesa = 0.31
wallet = 0.25

# Quality component weights for Full Analysis (S7-S12, with SCR)
# All metrics active including SCR for bot detection
[survivor_score.quality_full_analysis]
mpcf = 0.35
mesa = 0.25
scr = 0.20
wallet = 0.20

# Momentum component configuration
# Controls how SOBP and Chaos Engine contribute to momentum
[survivor_score.momentum]
sobp_base = 1.0
sobp_multiplier = 0.5
chaos_base = 0.7
chaos_multiplier = 0.6

# ==============================================================================
# 🎯 SECTION 10: CYCLE WEIGHTS & GUNSHOT THRESHOLDS
# ==============================================================================
# Controls the scoring loop timing and immediate buy triggers

[cycle_weights]
# Exponential weights for weighted geometric mean calculation
# Later cycles have exponentially higher influence on the final decision
# Weight distribution follows geometric progression with multiplier ~1.3:
# - S1-S6 (Early Stage): Lower weights
# - S7-S12 (Full Analysis): Higher weights
s1 = 1.3
s2 = 1.7
s3 = 2.2
s4 = 2.8
s5 = 3.6
s6 = 4.6
s7 = 6.0
s8 = 7.8
s9 = 10.0
s10 = 13.0
s11 = 17.0
s12 = 22.0

[gunshot_thresholds]
# Immediate buy triggers (descending thresholds)
# If raw score meets/exceeds threshold, buy immediately without waiting for S13
# Early Stage (S1-S6): Higher thresholds due to limited data confidence
# Full Analysis (S7-S12): Lower thresholds as confidence increases
s1 = 100.0  # God Candle - requires perfection
s2 = 99.0
s3 = 98.0
s4 = 97.0
s5 = 96.0
s6 = 95.0
s7 = 88.0   # Transition to Full Analysis
s8 = 87.0
s9 = 86.0
s10 = 85.0  # Strong trend confirmation
s11 = 83.5
s12 = 82.0  # Final Stand

# ==============================================================================
# 🛰️ SECTION 11: PARADOX SENSOR (HFT/Paradox Gate)
# ==============================================================================
[paradox]
enabled = true
window_size_ms = 500
analysis_interval_ms = 50
anomaly_tension_threshold = 80.0
max_samples = 2000
min_samples_for_analysis = 10

# ==============================================================================
# 🛡️ SECTION 12: POST-BUY GUARDIAN (Real-time Position Monitoring)
# ==============================================================================
# All fields have sensible defaults via #[serde(default)].
# Only override values you want to change from production defaults.
[post_buy_guardian]
enabled = true
tick_interval_ms = 500
max_monitored_positions = 10
signal_channel_buffer = 256

# LIGMA thresholds (liquidity depth monitoring)
ligma_warning_impact_bps = 3500.0
ligma_critical_impact_bps = 8000.0
ligma_warning_tradability = 0.4
ligma_critical_tradability = 0.15
ligma_probe_sol = 0.1

# WHF thresholds (wash trading / manipulation detection)
whf_min_confidence = 0.6
whf_wash_trading_is_critical = true
whf_min_net_flow_sol = 0.5
whf_wash_max_price_change = 0.02
whf_decay_min_price_drop = 0.05
whf_decay_max_volume_cv = 0.3

# TCF thresholds (trend cohesion / regime change)
tcf_warning_cohesion = 0.4
tcf_critical_cohesion = 0.2
tcf_cliff_is_warning = true
tcf_consecutive_low_max = 5

# PANIC thresholds (congestion / coordinated sell detection)
panic_warning_txps = 15.0
panic_critical_txps = 30.0
panic_low_entropy_threshold = 1.0
panic_rate_window_ms = 2000

# Signal aggregation / escalation
escalation_warning_count = 3
escalation_critical_count = 1
signal_aggregation_window_ms = 5000
max_signals_per_position = 200
