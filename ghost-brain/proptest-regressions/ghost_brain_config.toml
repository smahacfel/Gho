# Ghost Brain Unified Configuration - IWIM REBORN (v10)
# Strategy: "Data-Driven Predator" (Real Dev Check + Aggressive Volume)
version = 10

[engine]
cycle_duration_ms = 1000

# ==============================================================================
# 🛡️ GATEKEEPER V2: 6-Phase Analytical Filter
# ==============================================================================
[gatekeeper_v2]

# ── Mode ────────────────────────────────────────────────────────────────────────
# "standard" = Tryb reaktywny: Phase 1 trigger → re-eval → wczesne Buy/Reject możliwe
# "long"     = Tryb akumulacyjny: czeka pełne max_wait_time_ms, zbiera WSZYSTKIE TX,
#              jedna finalna ewaluacja na deadline. Brak wczesnych decyzji.
mode = "long"

# ── Pre-filter ──────────────────────────────────────────────────────────────────
min_sol_threshold = 0.1

# ── Phase 1: Quantity Gate ──────────────────────────────────────────────────────
# Odrzucamy duchy. Mediana A to 51, p10 dla A to 24. Próg 20 to absolutne minimum.
min_tx_count = 12
# P10 dla A to 18, dajemy mały bufor, żeby łapać też powtarzających się graczy.
min_unique_signers = 10
# Zachowujemy zdrową proporcję minimalną dla 20tx.
min_buy_count = 10

# Maksymalne okno ewaluacji
max_wait_time_ms = 10000

# ── Phase 2: Velocity Profile (WYKRYWACZ LUDZI) ─────────────────────────────────
# Dobry token ma chaotyczny timing, nie równomierny bot
min_interval_cv = 0.33
# Odcinamy sztuczne bundle (P90 dla A to 0.386, więc 0.40 to sufit)
max_burst_ratio = 0.40
# Tniemy maszynowe snajpienie z grupy B (mediana B to 127ms, A to 247ms)
min_avg_interval_ms = 140.0
# P90 dla A to 578ms. Dajemy 600ms, aby nie uciąć dobrych, lekko wolniejszych startów.
max_avg_interval_ms = 600.0
# Wymagamy wysokiego chaosu ludzkiego. P25 dla A to aż 1.944!
min_timing_entropy = 1.80
# Nowe: Zwycięzcy przyciągają spamerów (mediana A to 20, Trupy to 7).
# Próg 12 tnie ponad połowę śmieciowych kontraktów!
min_dust_filtered_count = 12

# ── Phase 3: Signer Diversity (ANTY-CABAL) ──────────────────────────────────────
# ODWRÓCONA LOGIKA: Prawdziwi ludzie powtarzają transakcje (kupno na 2 razy).
min_unique_ratio = 0.55
# ANTY-SYBIL: Jeśli >85% tx to nowiutkie portfele, to najpewniej atak botów udających tłum.
max_unique_ratio = 0.85
# NAJSILNIEJSZY PARAMETR. Mediana A to 0.038, B to 0.083. Tniemy bez litości.
max_hhi = 0.055
# Chroni przed całkowitą dominacją jednego portfela (jeeta) w krótkim czasie.
max_tx_per_signer = 6
# P75 dla A to 0.547. Umiarkowana nierówność jest zdrowa.
max_volume_gini = 0.55
# Top 3 graczy NIE MOŻE trzymać więcej niż połowy wolumenu na starcie.
max_top3_volume_pct = 0.50
# Jito Bundle Detection: Jeśli >30% tx wpadło w tej samej milisekundzie, to scam.
max_same_ms_tx_ratio = 0.30

# ── Phase 4: Volume Sanity (BARDZO WAŻNE) ───────────────────────────────────────
# ODWRÓCONA LOGIKA KUPNA: Musi być przewaga kupna...
min_buy_ratio = 0.55
# ...ALE NIE 100%! "Zielona ściana" z buy_ratio > 0.90 to w 95% sygnatura śmierci (braku ludzi).
max_buy_ratio = 0.85
# SOL Buy Ratio: Broni przed manipulacją (10 botów kupuje drobniaki, 1 dumpuje 5 SOL).
# Przewaga kapitałowa musi być po stronie kupujących.
min_sol_buy_ratio = 0.60
# Przy min_sol_threshold=0.1 każda TX >= 0.1 SOL
min_avg_tx_sol = 0.4
# Górny pułap na wieloryba
max_avg_tx_sol = 20.0
# OGROMNA RÓŻNICA W DANYCH (A=1.07, B=0.77). Wymagamy zróżnicowanych wolumenów!
min_volume_cv = 0.80
# Mediana A to 36 SOL. Odcinamy bieda-poole z wolumenem z powietrza.
min_total_volume_sol = 22.0
# FOMO Streak: Żądamy mini-eksplozji (np. 3 zakupy z rzędu bez sell'a) w oknie badawczym.
# Dowód na to, że rynek fizycznie "goni" cenę. Wartość 3-4 jest optymalna dla okna ~20tx.
min_consecutive_buys = 3

# ── Phase 5: Dev Behavior (SKIN IN THE GAME) ────────────────────────────────────
# DEV MUSI WIERZYĆ W PROJEKT. Tnie 90% micro-rugów. P25 dla A to 1.78 SOL, dla B: 0.99 SOL.
min_dev_buy_sol = 1.25
# Jeśli Dev ładuje >8 SOL, to po zyskaniu trakcji zrzuci na głowę (P90 dla A = 6.6)
max_dev_buy_sol = 8.0
# Dev ma nie robić wash tradingu! Mediana A to zaledwie 0.02.
max_dev_tx_ratio = 0.05
# Sufit dla udziału deva w obrocie (P90 dla A to 0.317).
max_dev_volume_ratio = 0.32
# Podłoga dla udziału deva w obrocie.
min_dev_volume_ratio = 0.0
reject_on_dev_sell = true

# ── Phase 6: Bonding Curve Dynamics ─────────────────────────────────────────────
# Ogranicza fałszywe, mechaniczne pompy.
max_price_change_ratio = 50.0
# Jedna TX nie może ruszyć ceną w górę o >33%.
max_single_tx_price_impact_pct = 33.0
# Max impact sprzedaży (DUMP detection). Czerwona świeca zwalająca >15% to koniec.
max_single_sell_impact_pct = 15.0
# P90 dla A to 45.2%. Token który ma >60% zbyt szybko, zaraz się wykrwawi z płynności.
max_bonding_progress_pct = 60.0
# Mediana Trupów to 49.2 SOL. To Twój twardy mur oddzielający ścieki od pereł!
min_market_cap_sol = 50.0

# ── Decision ────────────────────────────────────────────────────────────────────
# Zoptymalizowane filtry są bardzo precyzyjne, więc 5/6 to solidna tarcza.
min_phases_to_pass = 1
# Re-eval co 1 TX po fazie 1 (maksymalnie szybka reakcja po spełnieniu Phase 1)
re_eval_tx_interval = 1

